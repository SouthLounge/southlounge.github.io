<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FigGen // SouthLounge 002</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* LAYOUT */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .header-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            color: #333;
            text-transform: uppercase;
        }

        .header-back {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: #333;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .header-back:hover { color: #fff; }

        /* TITLE */
        .title-block {
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.1s forwards;
        }

        .title-block h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            color: #fff;
            letter-spacing: 0.1em;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .title-block h1:hover {
            animation: glitch 0.3s ease;
        }

        .title-block .subtitle {
            font-size: 1rem;
            color: #444;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }

        /* FORM */
        .form-section {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .url-input {
            width: 100%;
            background: #111;
            border: 1px solid #1a1a1a;
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            padding: 1rem 1.25rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .url-input:focus {
            border-color: #333;
        }

        .url-input::placeholder {
            color: #2a2a2a;
        }

        /* STYLE CARDS */
        .style-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .style-card {
            background: #111;
            border: 1px solid #1a1a1a;
            padding: 1.25rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .style-card:hover {
            border-color: #333;
        }

        .style-card.active {
            border-color: #555;
            background: #151515;
        }

        .style-card .style-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .style-card.active .style-name {
            color: #fff;
        }

        .style-card .style-preview {
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 0.1em;
        }

        /* OPTIONS */
        .options-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid #333;
            background: #111;
            cursor: pointer;
            position: relative;
        }

        .checkbox-group input[type="checkbox"]:checked {
            border-color: #666;
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 8px; height: 8px;
            background: #888;
        }

        .checkbox-group span {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: #555;
            text-transform: uppercase;
        }

        /* MODE TOGGLE */
        .mode-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .mode-card {
            background: #111;
            border: 1px solid #1a1a1a;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-card:hover {
            border-color: #333;
        }

        .mode-card.active {
            border-color: #555;
            background: #151515;
        }

        .mode-card .mode-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }

        .mode-card.active .mode-name {
            color: #fff;
        }

        .mode-card .mode-desc {
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 0.1em;
        }

        /* SOURCE INDICATOR */
        .source-indicator {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: #2a2a2a;
            text-align: right;
            margin-top: 0.5rem;
            display: none;
        }

        .source-indicator.visible {
            display: block;
        }

        /* GENERATE BUTTON */
        .generate-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #555;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            padding: 1.1rem 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .generate-btn:hover {
            border-color: #555;
            color: #fff;
        }

        .generate-btn:disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        .generate-btn:disabled:hover {
            border-color: #2a2a2a;
            color: #555;
        }

        /* LOADING STATE */
        .loading-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: #444;
            text-align: center;
            padding: 4rem 0;
            animation: pulse 2s ease-in-out infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ERROR STATE */
        .error-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #662222;
            text-align: center;
            padding: 2rem 0;
            display: none;
        }

        /* FIGURE VIEWPORT */
        .viewport-section {
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .figure-viewport {
            border: 1px solid #1a1a1a;
            min-height: 400px;
            position: relative;
            background: #0d0d0d;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .figure-viewport .placeholder {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        .figure-viewport svg {
            display: block;
            max-width: 100%;
        }

        /* DOWNLOAD BAR */
        .download-bar {
            display: none;
            gap: 0.75rem;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .download-bar.visible {
            display: flex;
        }

        .download-btn {
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #444;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            border-color: #444;
            color: #fff;
        }

        .json-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .json-modal.visible {
            display: flex;
        }
        .json-modal-inner {
            background: #111;
            border: 1px solid #333;
            padding: 1.5rem;
            width: 600px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .json-modal textarea {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #ccc;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 1rem;
            height: 400px;
            resize: vertical;
            outline: none;
        }
        .json-modal textarea:focus {
            border-color: #555;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .style-cards {
                grid-template-columns: repeat(2, 1fr);
            }
            .options-row {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="noise"></div>

<div class="container">
    <div class="header">
        <span class="header-label">SouthLounge // 002</span>
        <a href="/" class="header-back">&larr; Back</a>
    </div>

    <div class="title-block">
        <h1>FigGen</h1>
        <p class="subtitle">paste a paper. get a figure.</p>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>arXiv URL</label>
            <input type="text" class="url-input" id="arxivUrl" placeholder="https://arxiv.org/abs/1906.07769" autocomplete="off" spellcheck="false">
        </div>

        <div class="input-group">
            <label>Style</label>
            <div class="style-cards" id="styleCards">
                <div class="style-card active" data-style="icml">
                    <div class="style-name">ICML</div>
                    <div class="style-preview">serif / B&W</div>
                </div>
                <div class="style-card" data-style="neurips">
                    <div class="style-name">NeurIPS</div>
                    <div class="style-preview">serif / gray</div>
                </div>
                <div class="style-card" data-style="nature">
                    <div class="style-name">Nature</div>
                    <div class="style-preview">sans / blue</div>
                </div>
                <div class="style-card" data-style="dark">
                    <div class="style-name">Dark</div>
                    <div class="style-preview">mono / lounge</div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Source</label>
            <div class="mode-cards" id="modeCards">
                <div class="mode-card active" data-mode="abstract">
                    <div class="mode-name">Abstract</div>
                    <div class="mode-desc">fast / cheaper</div>
                </div>
                <div class="mode-card" data-mode="full">
                    <div class="mode-name">Full Paper</div>
                    <div class="mode-desc">richer / slower</div>
                </div>
            </div>
        </div>

        <div class="options-row">
            <label class="checkbox-group">
                <input type="checkbox" id="includeCaption" checked>
                <span>Caption</span>
            </label>
            <label class="checkbox-group">
                <input type="checkbox" id="includeLegend">
                <span>Legend</span>
            </label>
        </div>

        <div style="display: flex; gap: 0.75rem; align-items: center;">
            <button class="generate-btn" id="generateBtn">Generate</button>
            <button class="download-btn" id="loadJsonBtnTop" style="padding: 0.75rem 1rem;">Load JSON</button>
        </div>
    </div>

    <div class="viewport-section">
        <div class="figure-viewport" id="figureViewport">
            <span class="placeholder">AWAITING SIGNAL</span>
        </div>
        <div class="loading-text" id="loadingText">THINKING...</div>
        <div class="error-text" id="errorText"></div>
        <div class="download-bar" id="downloadBar">
            <button class="download-btn" id="downloadSvg">Download SVG</button>
            <button class="download-btn" id="downloadPng">Download PNG</button>
            <button class="download-btn" id="loadJsonBtn">Load JSON</button>
        </div>
        <div class="json-modal" id="jsonModal">
            <div class="json-modal-inner">
                <textarea id="jsonInput" placeholder="Paste scene graph JSON here..." spellcheck="false"></textarea>
                <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
                    <button class="download-btn" id="jsonCancel">Cancel</button>
                    <button class="generate-btn" id="jsonRender" style="font-size: 0.65rem; padding: 0.75rem 1.5rem;">Render</button>
                </div>
            </div>
        </div>
        <div class="source-indicator" id="sourceIndicator"></div>
    </div>
</div>

<script>
// ============================================================
// FigGen Renderer — JSON Scene Graph → SVG
// ============================================================

const API_URL = 'https://southlounge-api.vercel.app/api/generate';
const API_URL_FULL = 'https://southlounge-api.vercel.app/api/generate-full';

// ---- Style Profiles ----
const STYLES = {
    icml: {
        fontFamily: 'Georgia, "Times New Roman", serif',
        monoFont: '"Courier New", monospace',
        bg: '#ffffff',
        nodeFill: '#ffffff',
        nodeStroke: '#000000',
        nodeStrokeWidth: 1.5,
        textColor: '#000000',
        labelColor: '#555555',
        arrowColor: '#000000',
        accentColor: '#000000',
        containerStroke: '#999999',
        containerDash: '6,4',
        opFill: '#ffffff',
        opStroke: '#000000',
        fontSize: 13,
        smallFontSize: 10,
        labelFontSize: 9,
    },
    neurips: {
        fontFamily: 'Georgia, "Times New Roman", serif',
        monoFont: '"Courier New", monospace',
        bg: '#fafafa',
        nodeFill: '#f5f5f5',
        nodeStroke: '#aaaaaa',
        nodeStrokeWidth: 1,
        textColor: '#333333',
        labelColor: '#777777',
        arrowColor: '#666666',
        accentColor: '#555555',
        containerStroke: '#cccccc',
        containerDash: '5,3',
        opFill: '#f0f0f0',
        opStroke: '#999999',
        fontSize: 13,
        smallFontSize: 10,
        labelFontSize: 9,
    },
    nature: {
        fontFamily: 'Helvetica, Arial, sans-serif',
        monoFont: '"SF Mono", "Courier New", monospace',
        bg: '#ffffff',
        nodeFill: '#e8f0fe',
        nodeStroke: '#2962ff',
        nodeStrokeWidth: 1.5,
        textColor: '#1a1a2e',
        labelColor: '#5c6bc0',
        arrowColor: '#2962ff',
        accentColor: '#2962ff',
        containerStroke: '#90a4ae',
        containerDash: '6,4',
        opFill: '#e3f2fd',
        opStroke: '#2962ff',
        fontSize: 13,
        smallFontSize: 10,
        labelFontSize: 9,
    },
    dark: {
        fontFamily: '"Space Mono", monospace',
        monoFont: '"Space Mono", monospace',
        bg: '#0a0a0a',
        nodeFill: '#151515',
        nodeStroke: '#333333',
        nodeStrokeWidth: 1,
        textColor: '#e0e0e0',
        labelColor: '#666666',
        arrowColor: '#555555',
        accentColor: '#888888',
        containerStroke: '#2a2a2a',
        containerDash: '5,3',
        opFill: '#111111',
        opStroke: '#444444',
        fontSize: 13,
        smallFontSize: 10,
        labelFontSize: 9,
    }
};

// ---- SVG Namespace ----
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs = {}) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
    }
    return el;
}

// ---- Primitive Renderers ----

function renderRect(node, style) {
    const g = svgEl('g');
    const w = node.width || 120;
    const h = node.height || 50;
    const rx = node.rx || 4;

    const rect = svgEl('rect', {
        x: node.x, y: node.y,
        width: w, height: h,
        rx: rx,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
    });
    g.appendChild(rect);

    // Type label (small, top)
    if (node.type_label) {
        const tl = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + 15,
            'text-anchor': 'middle',
            fill: node.label_color || style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
            'letter-spacing': '0.05em',
        });
        tl.textContent = node.type_label;
        g.appendChild(tl);
    }

    // Main label
    if (node.label) {
        const yOffset = node.type_label ? (h / 2 + 5) : (h / 2 + 4);
        const label = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + yOffset,
            'text-anchor': 'middle',
            fill: node.text_color || style.textColor,
            'font-family': style.fontFamily,
            'font-size': node.font_size || style.fontSize,
            'font-weight': node.bold ? '700' : '400',
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    // Sublabel (small, bottom)
    if (node.sublabel) {
        const sl = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + h - 8,
            'text-anchor': 'middle',
            fill: node.label_color || style.labelColor,
            'font-family': style.fontFamily,
            'font-size': style.smallFontSize,
            'font-style': 'italic',
        });
        sl.textContent = node.sublabel;
        g.appendChild(sl);
    }

    return g;
}

function renderTrapezoid(node, style) {
    const g = svgEl('g');
    const w = node.width || 120;
    const h = node.height || 50;
    const tw = node.top_width || w * 0.6;
    const offset = (w - tw) / 2;

    // Points: bottom-left, bottom-right, top-right, top-left
    const points = [
        `${node.x},${node.y + h}`,
        `${node.x + w},${node.y + h}`,
        `${node.x + w - offset},${node.y}`,
        `${node.x + offset},${node.y}`,
    ].join(' ');

    // If direction is "up" (wider at top), reverse
    let finalPoints = points;
    if (node.direction === 'up') {
        finalPoints = [
            `${node.x + offset},${node.y + h}`,
            `${node.x + w - offset},${node.y + h}`,
            `${node.x + w},${node.y}`,
            `${node.x},${node.y}`,
        ].join(' ');
    }

    const path = svgEl('polygon', {
        points: finalPoints,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
    });
    g.appendChild(path);

    if (node.label) {
        const label = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + h / 2 + 5,
            'text-anchor': 'middle',
            fill: node.text_color || style.textColor,
            'font-family': style.fontFamily,
            'font-size': node.font_size || style.fontSize,
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderStackedBlock(node, style) {
    const g = svgEl('g');
    const w = node.width || 120;
    const layers = node.layers || [{ label: 'Layer' }];
    const layerH = node.layer_height || 36;
    const gap = node.gap || 2;
    const totalH = layers.length * layerH + (layers.length - 1) * gap;

    // Container stroke if needed
    if (node.show_border) {
        const border = svgEl('rect', {
            x: node.x - 4, y: node.y - 4,
            width: w + 8, height: totalH + 8,
            rx: 4,
            fill: 'none',
            stroke: node.stroke || style.containerStroke,
            'stroke-width': 1,
            'stroke-dasharray': style.containerDash,
        });
        g.appendChild(border);
    }

    layers.forEach((layer, i) => {
        const ly = node.y + i * (layerH + gap);
        const rect = svgEl('rect', {
            x: node.x, y: ly,
            width: w, height: layerH,
            rx: 3,
            fill: layer.fill || node.fill || style.nodeFill,
            stroke: layer.stroke || node.stroke || style.nodeStroke,
            'stroke-width': style.nodeStrokeWidth,
        });
        g.appendChild(rect);

        if (layer.label) {
            const label = svgEl('text', {
                x: node.x + w / 2,
                y: ly + layerH / 2 + 4,
                'text-anchor': 'middle',
                fill: layer.text_color || style.textColor,
                'font-family': style.fontFamily,
                'font-size': layer.font_size || style.smallFontSize,
            });
            label.textContent = layer.label;
            g.appendChild(label);
        }
    });

    // Block label above or below
    if (node.label) {
        const labelY = node.label_position === 'bottom'
            ? node.y + totalH + 18
            : node.y - 10;
        const label = svgEl('text', {
            x: node.x + w / 2,
            y: labelY,
            'text-anchor': 'middle',
            fill: node.text_color || style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
            'letter-spacing': '0.05em',
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderCircleOp(node, style) {
    const g = svgEl('g');
    const r = node.r || 16;

    const circle = svgEl('circle', {
        cx: node.x, cy: node.y,
        r: r,
        fill: node.fill || style.opFill,
        stroke: node.stroke || style.opStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
    });
    g.appendChild(circle);

    const symbol = svgEl('text', {
        x: node.x,
        y: node.y + 5,
        'text-anchor': 'middle',
        fill: node.text_color || style.textColor,
        'font-family': style.fontFamily,
        'font-size': node.font_size || 16,
    });
    symbol.textContent = node.symbol || '+';
    g.appendChild(symbol);

    if (node.label) {
        const label = svgEl('text', {
            x: node.x,
            y: node.y + r + 16,
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderArrow(node, style) {
    const g = svgEl('g');
    const points = node.points || [];
    if (points.length < 2) return g;

    // Build marker ID unique to this arrow
    const markerId = 'arrowhead-' + Math.random().toString(36).slice(2, 8);
    const defs = svgEl('defs');
    const marker = svgEl('marker', {
        id: markerId,
        markerWidth: '8', markerHeight: '6',
        refX: '8', refY: '3',
        orient: 'auto',
        markerUnits: 'strokeWidth',
    });
    const markerPath = svgEl('path', {
        d: 'M0,0 L8,3 L0,6 Z',
        fill: node.color || style.arrowColor,
    });
    marker.appendChild(markerPath);
    defs.appendChild(marker);
    g.appendChild(defs);

    const pointStr = points.map(p => `${p[0]},${p[1]}`).join(' ');
    const attrs = {
        points: pointStr,
        fill: 'none',
        stroke: node.color || style.arrowColor,
        'stroke-width': node.stroke_width || 1.5,
        'marker-end': `url(#${markerId})`,
    };

    if (node.dashed) {
        attrs['stroke-dasharray'] = node.dash_pattern || '6,3';
    }

    const polyline = svgEl('polyline', attrs);
    g.appendChild(polyline);

    // Inline label on arrow
    if (node.label) {
        const mid = points[Math.floor(points.length / 2)];
        const label = svgEl('text', {
            x: mid[0] + (node.label_offset_x || 8),
            y: mid[1] + (node.label_offset_y || -6),
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
            'font-style': 'italic',
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderContainer(node, style) {
    const g = svgEl('g');
    const w = node.width || 200;
    const h = node.height || 150;

    const rect = svgEl('rect', {
        x: node.x, y: node.y,

    if (node.label) {
        const lx = node.label_position === 'center' ? node.x + w / 2 : node.x + 8;
        const ly = node.label_position === 'center' ? node.y + h / 2 + 4 : node.y - 8;
        const anchor = node.label_position === 'center' ? 'middle' : 'start';
        const label = svgEl('text', {
            x: lx, y: ly,
            'text-anchor': anchor,

function renderTextLabel(node, style) {

function renderDots(node, style) {
    const g = svgEl('g');
    const spacing = node.spacing || 8;
    const r = node.dot_radius || 2;
    const direction = node.direction || 'vertical';

    for (let i = 0; i < 3; i++) {
        const cx = direction === 'horizontal' ? node.x + i * spacing : node.x;
        const cy = direction === 'vertical' ? node.y + i * spacing : node.y;
        const dot = svgEl('circle', {
            cx, cy, r,
            fill: node.color || style.labelColor,
        });
        g.appendChild(dot);
    }

    return g;
}

// ---- Phase 1: New Primitives ----

function renderTensorBlock(node, style) {
    const g = svgEl('g');
    const w = node.width || 100;
    const h = node.height || 60;
    const d = node.depth || 16; // 3D depth offset

    // Back face (offset)
    const backFace = svgEl('rect', {
        x: node.x + d, y: node.y - d,
        width: w, height: h,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
        opacity: 0.5,
    });
    g.appendChild(backFace);

    // Top face (parallelogram)
    const topPoints = [
        `${node.x},${node.y}`,
        `${node.x + d},${node.y - d}`,
        `${node.x + w + d},${node.y - d}`,
        `${node.x + w},${node.y}`,
    ].join(' ');
    const topFace = svgEl('polygon', {
        points: topPoints,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
        opacity: 0.7,
    });
    g.appendChild(topFace);

    // Right face (parallelogram)
    const rightPoints = [
        `${node.x + w},${node.y}`,
        `${node.x + w + d},${node.y - d}`,
        `${node.x + w + d},${node.y + h - d}`,
        `${node.x + w},${node.y + h}`,
    ].join(' ');
    const rightFace = svgEl('polygon', {
        points: rightPoints,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
        opacity: 0.6,
    });
    g.appendChild(rightFace);

    // Front face
    const frontFace = svgEl('rect', {
        x: node.x, y: node.y,
        width: w, height: h,
        fill: node.fill || style.nodeFill,
        stroke: node.stroke || style.nodeStroke,
        'stroke-width': node.stroke_width || style.nodeStrokeWidth,
    });
    g.appendChild(frontFace);

    // Label
    if (node.label) {
        const label = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + h / 2 + 5,
            'text-anchor': 'middle',
            fill: node.text_color || style.textColor,
            'font-family': style.fontFamily,
            'font-size': node.font_size || style.fontSize,
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    // Dimension labels on edges
    if (node.dim_top) {
        const dt = svgEl('text', {
            x: node.x + w / 2, y: node.y - d - 5,
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
        });
        dt.textContent = node.dim_top;
        g.appendChild(dt);
    }
    if (node.dim_right) {
        const dr = svgEl('text', {
            x: node.x + w + d + 5, y: node.y + h / 2 - d / 2,
            'text-anchor': 'start',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
        });
        dr.textContent = node.dim_right;
        g.appendChild(dr);
    }
    if (node.dim_bottom) {
        const db = svgEl('text', {
            x: node.x + w / 2, y: node.y + h + 14,
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
        });
        db.textContent = node.dim_bottom;
        g.appendChild(db);
    }

    return g;
}

function renderWaveform(node, style) {
    const g = svgEl('g');
    const w = node.width || 100;
    const h = node.height || 30;
    const periods = node.periods || 4;
    const amplitude = h / 2;

    // Build sinusoidal path
    let d = `M ${node.x} ${node.y}`;
    const steps = periods * 20;
    for (let i = 0; i <= steps; i++) {
        const px = node.x + (i / steps) * w;
        const py = node.y + Math.sin((i / steps) * periods * Math.PI * 2) * amplitude;
        d += ` L ${px.toFixed(1)} ${py.toFixed(1)}`;
    }

    const path = svgEl('path', {
        d: d,
        fill: 'none',
        stroke: node.color || style.accentColor,
        'stroke-width': node.stroke_width || 1.5,
    });
    g.appendChild(path);

    if (node.label) {
        const label = svgEl('text', {
            x: node.x + w / 2,
            y: node.y + amplitude + 16,
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderBracket(node, style) {
    const g = svgEl('g');
    const w = node.width || 200;
    const tickH = node.tick_height || 8;
    const direction = node.direction || 'horizontal';

    if (direction === 'horizontal') {
        // Horizontal bracket: ←——— label ———→
        const y = node.y;
        // Left tick
        g.appendChild(svgEl('line', {
            x1: node.x, y1: y - tickH, x2: node.x, y2: y + tickH,
            stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));
        // Right tick
        g.appendChild(svgEl('line', {
            x1: node.x + w, y1: y - tickH, x2: node.x + w, y2: y + tickH,
            stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));
        // Horizontal line (left half)
        const mid = node.x + w / 2;
        const labelGap = node.label ? 40 : 0;
        g.appendChild(svgEl('line', {
            x1: node.x, y1: y, x2: mid - labelGap, y2: y,
            stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));
        // Horizontal line (right half)
        g.appendChild(svgEl('line', {
            x1: mid + labelGap, y1: y, x2: node.x + w, y2: y,
            stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));
        // Arrowheads
        const aSize = 5;
        g.appendChild(svgEl('path', {
            d: `M${node.x + aSize},${y - aSize / 2} L${node.x},${y} L${node.x + aSize},${y + aSize / 2}`,
            fill: 'none', stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));
        g.appendChild(svgEl('path', {
            d: `M${node.x + w - aSize},${y - aSize / 2} L${node.x + w},${y} L${node.x + w - aSize},${y + aSize / 2}`,
            fill: 'none', stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));

        if (node.label) {
            const label = svgEl('text', {
                x: mid, y: y + 4,
                'text-anchor': 'middle',
                fill: node.color || style.textColor,
                'font-family': style.fontFamily,
                'font-size': node.font_size || style.smallFontSize,
            });
            label.textContent = node.label;
            g.appendChild(label);
        }
    } else {
        // Vertical curly brace approximation
        const h = node.height || 200;
        const x = node.x;
        const mid = node.y + h / 2;
        const bulge = 8;

        const d = `M ${x},${node.y} Q ${x - bulge},${node.y} ${x - bulge},${node.y + h * 0.25} `
            + `T ${x - bulge * 2},${mid} `
            + `Q ${x - bulge},${mid} ${x - bulge},${node.y + h * 0.75} `
            + `T ${x},${node.y + h}`;
        g.appendChild(svgEl('path', {
            d, fill: 'none',
            stroke: node.color || style.textColor, 'stroke-width': 1.5,
        }));

        if (node.label) {
            const label = svgEl('text', {
                x: x - bulge * 2 - 8, y: mid + 4,
                'text-anchor': 'end',
                fill: node.color || style.textColor,
                'font-family': style.fontFamily,
                'font-size': node.font_size || style.smallFontSize,
            });
            label.textContent = node.label;
            g.appendChild(label);
        }
    }

    return g;
}

function renderCurvedArrow(node, style) {
    const g = svgEl('g');
    const pts = node.points || [];
    if (pts.length < 2) return g;

    // Build marker
    const markerId = 'carrow-' + Math.random().toString(36).slice(2, 8);
    const defs = svgEl('defs');
    const marker = svgEl('marker', {
        id: markerId,
        markerWidth: '8', markerHeight: '6',
        refX: '8', refY: '3',
        orient: 'auto', markerUnits: 'strokeWidth',
    });
    marker.appendChild(svgEl('path', {
        d: 'M0,0 L8,3 L0,6 Z',
        fill: node.color || style.arrowColor,
    }));
    defs.appendChild(marker);
    g.appendChild(defs);

    // Build cubic bezier path
    let d;
    if (pts.length === 2) {
        // Auto-generate control points for a nice curve
        const [x1, y1] = pts[0];
        const [x2, y2] = pts[1];
        const dx = x2 - x1, dy = y2 - y1;
        const curvature = node.curvature || 0.4;
        const cx1 = x1 + dx * curvature;
        const cy1 = y1;
        const cx2 = x2 - dx * curvature;
        const cy2 = y2;
        d = `M ${x1},${y1} C ${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
    } else if (pts.length === 3) {
        // Quadratic through control point
        d = `M ${pts[0][0]},${pts[0][1]} Q ${pts[1][0]},${pts[1][1]} ${pts[2][0]},${pts[2][1]}`;
    } else {
        // Cubic with explicit control points
        d = `M ${pts[0][0]},${pts[0][1]} C ${pts[1][0]},${pts[1][1]} ${pts[2][0]},${pts[2][1]} ${pts[3][0]},${pts[3][1]}`;
    }

    const attrs = {
        d, fill: 'none',
        stroke: node.color || style.arrowColor,
        'stroke-width': node.stroke_width || 2,
        'marker-end': `url(#${markerId})`,
    };
    if (node.dashed) attrs['stroke-dasharray'] = node.dash_pattern || '6,3';

    g.appendChild(svgEl('path', attrs));

    if (node.label) {
        const mid = pts[Math.floor(pts.length / 2)];
        const label = svgEl('text', {
            x: mid[0] + (node.label_offset_x || 0),
            y: mid[1] + (node.label_offset_y || -10),
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.monoFont,
            'font-size': style.labelFontSize,
            'font-style': 'italic',
        });
        label.textContent = node.label;
        g.appendChild(label);
    }

    return g;
}

function renderSideAnnotation(node, style) {

function renderVerticalLabel(node, style) {

function renderRepeatMarker(node, style) {

// ---- Phase 2: Hierarchical Panel Rendering ----

function renderNodesIntoGroup(nodes, style, renderers) {
    const g = svgEl('g');
    const containers = nodes.filter(n => n.kind === 'container');
    const arrows = nodes.filter(n => n.kind === 'arrow' || n.kind === 'curved_arrow');
    const rest = nodes.filter(n => n.kind !== 'container' && n.kind !== 'arrow' && n.kind !== 'curved_arrow');
    const ordered = [...containers, ...rest, ...arrows];

    for (const node of ordered) {
        const renderer = renderers[node.kind];
        if (renderer) {
            g.appendChild(renderer(node, style));
        }
    }
    return g;
}

// ---- Main Render Function ----

function renderSceneGraph(sceneGraph, styleName) {
    const style = STYLES[styleName] || STYLES.icml;
    const width = sceneGraph.width || 800;
    const height = sceneGraph.height || 500;

    const svg = svgEl('svg', {
        xmlns: SVG_NS,
        width: width,
        height: height,
        viewBox: `0 0 ${width} ${height}`,
    });

    // Background
    const bg = svgEl('rect', {
        x: 0, y: 0,
        width: width, height: height,
        fill: style.bg,
    });
    svg.appendChild(bg);

    // Title
    if (sceneGraph.title) {
        const title = svgEl('text', {
            x: width / 2,
            y: 30,
            'text-anchor': 'middle',
            fill: style.textColor,
            'font-family': style.fontFamily,
            'font-size': 16,
            'font-weight': '700',
        });
        title.textContent = sceneGraph.title;
        svg.appendChild(title);
    }

    const renderers = {
        rect: renderRect,
        trapezoid: renderTrapezoid,
        stacked_block: renderStackedBlock,
        circle_op: renderCircleOp,
        arrow: renderArrow,
        container: renderContainer,
        text_label: renderTextLabel,
        dots: renderDots,
        tensor_block: renderTensorBlock,
        waveform: renderWaveform,
        bracket: renderBracket,
        curved_arrow: renderCurvedArrow,
        side_annotation: renderSideAnnotation,
        vertical_label: renderVerticalLabel,
        repeat_marker: renderRepeatMarker,
    };

    // Check for hierarchical panel layout
    if (sceneGraph.panels && sceneGraph.panels.length > 0) {
        // Render each panel
        for (const panel of sceneGraph.panels) {
            const pg = svgEl('g');

            // Panel offset
            const ox = panel.x || 0;
            const oy = panel.y || 0;
            pg.setAttribute('transform', `translate(${ox}, ${oy})`);

            // Panel background (subtle)
            if (panel.width && panel.height) {
                const panelBg = svgEl('rect', {
                    x: 0, y: 0,
                    width: panel.width, height: panel.height,
                    rx: 6,
                    fill: panel.fill || 'none',
                    stroke: panel.border ? (style.containerStroke) : 'none',
                    'stroke-width': 1,
                    'stroke-dasharray': panel.border ? style.containerDash : 'none',
                });
                pg.appendChild(panelBg);
            }

            // Panel label (a), (b), etc.
            if (panel.label) {
                const pl = svgEl('text', {
                    x: 8,
                    y: panel.label_y || -8,
                    'text-anchor': 'start',
                    fill: style.textColor,
                    'font-family': style.fontFamily,
                    'font-size': 13,
                    'font-weight': '700',
                });
                pl.textContent = panel.label;
                pg.appendChild(pl);
            }

            // Render panel nodes
            const panelNodes = panel.nodes || [];
            pg.appendChild(renderNodesIntoGroup(panelNodes, style, renderers));

            svg.appendChild(pg);
        }
    } else {
        // Flat layout (backwards compatible)
        const nodes = sceneGraph.nodes || [];
        svg.appendChild(renderNodesIntoGroup(nodes, style, renderers));
    }

    // Caption (word-wrapped)
    if (sceneGraph.caption) {
        const maxCaptionW = width - 80;
        const capFontSize = parseFloat(style.smallFontSize) || 11;
        const charWidth = capFontSize * 0.52;
        const maxCharsPerLine = Math.floor(maxCaptionW / charWidth);
        const words = sceneGraph.caption.split(' ');
        const lines = [];
        let currentLine = '';
        for (const word of words) {
            if ((currentLine + ' ' + word).trim().length > maxCharsPerLine && currentLine) {
                lines.push(currentLine);
                currentLine = word;
            } else {
                currentLine = currentLine ? currentLine + ' ' + word : word;
            }
        }
        if (currentLine) lines.push(currentLine);

        const lineHeight = capFontSize + 4;
        const captionStartY = height - 12 - (lines.length - 1) * lineHeight;
        const caption = svgEl('text', {
            x: width / 2,
            y: captionStartY,
            'text-anchor': 'middle',
            fill: style.labelColor,
            'font-family': style.fontFamily,
            'font-size': style.smallFontSize,
            'font-style': 'italic',
        });
        for (let i = 0; i < lines.length; i++) {
            const tspan = svgEl('tspan', {
                x: width / 2,
                dy: i === 0 ? 0 : lineHeight,
            });
            tspan.textContent = lines[i];
            caption.appendChild(tspan);
        }
        svg.appendChild(caption);
    }

    return svg;
}

// ---- UI Logic ----

let currentStyle = 'icml';
let currentMode = 'abstract';
let currentSvg = null;

// Mode card selection
document.getElementById('modeCards').addEventListener('click', (e) => {
    const card = e.target.closest('.mode-card');
    if (!card) return;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    currentMode = card.dataset.mode;
});

// Style card selection
document.getElementById('styleCards').addEventListener('click', (e) => {
    const card = e.target.closest('.style-card');
    if (!card) return;
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    currentStyle = card.dataset.style;

    // Re-render if we have a figure
    if (currentSvg) {
        const viewport = document.getElementById('figureViewport');
        const sceneData = viewport._sceneData;
        if (sceneData) {
            renderToViewport(sceneData, currentStyle);
        }
    }
});

function renderToViewport(sceneGraph, styleName) {
    const viewport = document.getElementById('figureViewport');
    viewport.innerHTML = '';
    viewport._sceneData = sceneGraph;

    const svg = renderSceneGraph(sceneGraph, styleName);
    viewport.appendChild(svg);
    currentSvg = svg;

    document.getElementById('downloadBar').classList.add('visible');
}

function showLoading(mode) {
    const loadingEl = document.getElementById('loadingText');
    loadingEl.textContent = mode === 'full' ? 'READING PAPER...' : 'THINKING...';
    loadingEl.style.display = 'block';
    document.getElementById('errorText').style.display = 'none';
    document.getElementById('figureViewport').innerHTML = '';
    document.getElementById('downloadBar').classList.remove('visible');
    document.getElementById('sourceIndicator').classList.remove('visible');
    currentSvg = null;
}

function hideLoading() {
    document.getElementById('loadingText').style.display = 'none';
}

function showError(msg) {
    hideLoading();
    const el = document.getElementById('errorText');
    el.textContent = msg;
    el.style.display = 'block';
}

// Generate button
document.getElementById('generateBtn').addEventListener('click', async () => {
    const url = document.getElementById('arxivUrl').value.trim();
    if (!url) {
        showError('SIGNAL LOST \u2014 paste an arXiv URL first');
        return;
    }

    // Validate arXiv URL
    const arxivMatch = url.match(/arxiv\.org\/(?:abs|pdf)\/(\d{4}\.\d{4,5})/);
    if (!arxivMatch) {
        showError('SIGNAL LOST \u2014 invalid arXiv URL format');
        return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'GENERATING...';
    showLoading(currentMode);

    const endpoint = currentMode === 'full' ? API_URL_FULL : API_URL;

    try {
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                arxiv_url: url,
                style: currentStyle,
                include_caption: document.getElementById('includeCaption').checked,
                include_legend: document.getElementById('includeLegend').checked,
            }),
        });

        if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || `HTTP ${response.status}`);
        }

        const data = await response.json();
        hideLoading();
        renderToViewport(data.scene_graph, currentStyle);

        // Show source indicator
        if (data.source) {
            const sourceEl = document.getElementById('sourceIndicator');
            sourceEl.textContent = `generated via ${data.source}`;
            sourceEl.classList.add('visible');
        }
    } catch (err) {
        showError('FIGURE FAILED TO MATERIALIZE \u2014 ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'GENERATE';
    }
});

// Download SVG
document.getElementById('downloadSvg').addEventListener('click', () => {
    if (!currentSvg) return;
    const serializer = new XMLSerializer();
    const svgStr = serializer.serializeToString(currentSvg);
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'figgen-figure.svg';
    a.click();
    URL.revokeObjectURL(url);
});

// Download PNG
document.getElementById('downloadPng').addEventListener('click', () => {
    if (!currentSvg) return;
    const serializer = new XMLSerializer();
    const svgStr = serializer.serializeToString(currentSvg);
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = 2; // Retina quality
        canvas.width = currentSvg.getAttribute('width') * scale;
        canvas.height = currentSvg.getAttribute('height') * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);

        canvas.toBlob((blob) => {
            const pngUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = pngUrl;
            a.download = 'figgen-figure.png';
            a.click();
            URL.revokeObjectURL(pngUrl);
        }, 'image/png');
    };
    img.src = url;
});

// Load JSON modal
const jsonModal = document.getElementById('jsonModal');
function openJsonModal() {
    jsonModal.classList.add('visible');
    document.getElementById('jsonInput').focus();
}
document.getElementById('loadJsonBtn').addEventListener('click', openJsonModal);
document.getElementById('loadJsonBtnTop').addEventListener('click', openJsonModal);
document.getElementById('jsonCancel').addEventListener('click', () => {
    jsonModal.classList.remove('visible');
});
jsonModal.addEventListener('click', (e) => {
    if (e.target === jsonModal) jsonModal.classList.remove('visible');
});
document.getElementById('jsonRender').addEventListener('click', () => {
    const input = document.getElementById('jsonInput').value.trim();
    if (!input) return;
    try {
        const sg = JSON.parse(input);
        renderToViewport(sg, currentStyle);
        jsonModal.classList.remove('visible');
        document.getElementById('errorText').style.display = 'none';
        document.getElementById('sourceIndicator').textContent = 'loaded from JSON';
        document.getElementById('sourceIndicator').classList.add('visible');
    } catch (err) {
        alert('Invalid JSON: ' + err.message);
    }
});
